name: Selenium Automation

on:
  push:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Execute Tests
        run: mvn clean test

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: reports/